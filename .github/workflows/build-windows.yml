name: Build Windows Version

on:
  workflow_dispatch:

env:
  SCITER_RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-RustDeskTempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: true
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10

  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-for-windows:
    name: Windows x64 (Flutter)
    needs: [build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7.0.1
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/
        shell: pwsh

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          if [ "${{env.FLUTTER_VERSION}}" = "3.24.5" ]; then
            git apply flutter_3.24.4_dropdown_menu_enableFilter.diff
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install --triplet x64-windows-static --x-install-root="$env:VCPKG_ROOT/installed"
          if ($LASTEXITCODE -ne 0) {
            Get-ChildItem -Path "${env:VCPKG_ROOT}" -Filter "*.log" -Recurse | ForEach-Object {
              Write-Host "=== Content of $($_.FullName) ==="
              Get-Content $_.FullName
              Write-Host "=== End of $($_.FullName) ==="
            }
            exit 1
          }
          if (Test-Path "${env:VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log") {
            Get-Content "${env:VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" -Head 100
          }
        shell: pwsh

      - name: Build rustdesk
        id: build-rustdesk
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed!"
            exit 1
          }
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk
          Write-Host "Build completed successfully"
          Write-Host "Listing rustdesk directory:"
          Get-ChildItem ./rustdesk
        shell: pwsh

      - name: Download usbmmidd_v2
        run: |
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse -ErrorAction SilentlyContinue
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat" -ErrorAction SilentlyContinue
          mv -Force .\usbmmidd_v2 ./rustdesk
        shell: pwsh

      - name: Download printer driver
        continue-on-error: true
        run: |
          try {
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums

            $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4-1.4\.zip$').Matches.Groups[1].Value
            $downloadsum_driver = (Get-FileHash -Path rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256).Hash
            $checksum_adapter = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter\.zip$').Matches.Groups[1].Value
            $downloadsum_adapter = (Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256).Hash
            
            if ($checksum_driver -eq $downloadsum_driver -and $checksum_adapter -eq $downloadsum_adapter) {
                Write-Output "Checksums match, extracting printer driver."
                Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
                mkdir ./rustdesk/drivers -Force
                mv -Force .\rustdesk_printer_driver_v4-1.4 ./rustdesk/drivers/RustDeskPrinterDriver
                Expand-Archive printer_driver_adapter.zip -DestinationPath .
                mv -Force .\printer_driver_adapter.dll ./rustdesk
            } else {
                Write-Output "Checksums do not match, skipping printer driver."
            }
          } catch {
              Write-Host "Failed to download printer driver, skipping."
          }
        shell: pwsh

      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@v4
        with:
          name: topmostwindow-artifacts
          path: "./rustdesk"

      - name: List rustdesk directory before upload
        run: |
          Write-Host "Listing rustdesk directory contents:"
          Get-ChildItem ./rustdesk -Recurse
          Write-Host "Total files: $(Get-ChildItem ./rustdesk -Recurse | Measure-Object).Count"
        shell: pwsh

      - name: Build self-extracted executable
        id: build-portable-packer
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          cd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          cd ../..
          mkdir -p ./SignOutput
          if (Test-Path ./target/release/rustdesk-portable-packer.exe) {
            mv ./target/release/rustdesk-portable-packer.exe ./SignOutput/rustdesk-${{ env.VERSION }}-x64.exe
            Write-Host "Self-extracted executable created successfully"
          } else {
            Write-Host "ERROR: rustdesk-portable-packer.exe not found!"
            exit 1
          }
        shell: pwsh

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2.0.0

      - name: Build msi
        id: build-msi
        run: |
          cd ./res/msi
          python preprocess.py --arp -d ../../rustdesk
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          if ($LASTEXITCODE -ne 0) {
            Write-Host "MSBuild failed!"
            exit 1
          }
          mv ./Package/bin/x64/Release/en-us/Package.msi ../../SignOutput/rustdesk-${{ env.VERSION }}-x64.msi
          Write-Host "MSI created successfully"
        shell: pwsh

      - name: Verify output files
        run: |
          Write-Host "Listing SignOutput directory:"
          Get-ChildItem ./SignOutput
          Write-Host ""
          Write-Host "File sizes:"
          Get-ChildItem ./SignOutput | ForEach-Object {
            Write-Host "$($_.Name): $([math]::Round($_.Length / 1MB, 2)) MB"
          }
        shell: pwsh

      - name: Upload final installers
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-installers
          path: SignOutput
          retention-days: 7

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-${{ github.run_id }}
          name: RustDesk v${{ env.VERSION }} (Windows)
          prerelease: false
          generate_release_notes: true
          files: |
            ./SignOutput/rustdesk-${{ env.VERSION }}-x64.exe
            ./SignOutput/rustdesk-${{ env.VERSION }}-x64.msi